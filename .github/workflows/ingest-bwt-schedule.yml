name: Ingest CBP Wait Times (Supabase Schedule)

on:
  schedule:
    - cron: "3-53/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ingest-bwt-cron
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      INGEST_URL: https://ymlunuhplrcdemewtyxf.functions.supabase.co/ingest-bwt
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltbHVudWhwbHJjZGVtZXd0eXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MDUxNzgsImV4cCI6MjA4NzQ4MTE3OH0.53eYzkPUVy26rDfsIhuew34MzBRMSiAi1LwX5ku-PEo

    steps:
      - name: Call Supabase Edge Function
        run: |
          set -euo pipefail

          echo "Calling: ${INGEST_URL}"

          response="$(
            curl --fail-with-body --silent --show-error \
              --request POST "${INGEST_URL}" \
              --header "Content-Type: application/json" \
              --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              --header "apikey: ${SUPABASE_ANON_KEY}" \
              --data '{}'
          )"

          echo "${response}" | head -c 2000
          echo ""
