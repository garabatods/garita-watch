name: Ingest CBP Wait Times (Supabase)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call Supabase Edge Function
        env:
          INGEST_URL: ${{ secrets.SUPABASE_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.SUPABASE_INGEST_TOKEN }}
        run: |
          set -euo pipefail
          echo "Calling: $INGEST_URL"
          curl -sS -X POST "$INGEST_URL" \
            -H "Content-Type: application/json" \
            -H "x-ingest-token: $INGEST_TOKEN" \
            -d "{}" \
            | head -c 1200
          echo ""
